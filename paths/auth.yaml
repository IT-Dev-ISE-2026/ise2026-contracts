register:
  post:
    operationId: registerUser
    summary: Register a new user
    tags: [Auth]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [email, password]
            properties:
              email:
                type: string
                format: email
              password:
                type: string
                minLength: 8
    responses:
      '201':
        description: User created
        content:
          application/json:
            schema:
              type: object
              required: [data, meta]
              properties:
                data:
                  type: object
                  required: [id, email, role, created_at]
                  properties:
                    id:
                      type: string
                      format: uuid
                    email:
                      type: string
                    role:
                      type: string
                    created_at:
                      type: string
                      format: date-time
                meta:
                  type: object
                  required: [request_id]
                  properties:
                    request_id:
                      type: string
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              type: object
              required: [error, meta]
              properties:
                error:
                  type: string
                meta:
                  type: object
                  required: [request_id]
                  properties:
                    request_id:
                      type: string
      '409':
        description: Resource already exists
        content:
          application/json:
            schema:
              type: object
              required: [error, meta]
              properties:
                error:
                  type: string
                meta:
                  type: object
                  required: [request_id]
                  properties:
                    request_id:
                      type: string

login:
  post:
    operationId: loginUser
    summary: Login and get tokens
    tags: [Auth]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [email, password]
            properties:
              email:
                type: string
                format: email
              password:
                type: string
    responses:
      '200':
        description: Token pair
        content:
          application/json:
            schema:
              type: object
              required: [data, meta]
              properties:
                data:
                  type: object
                  required: [access_token, refresh_token]
                  properties:
                    access_token:
                      type: string
                    refresh_token:
                      type: string
                meta:
                  type: object
                  required: [request_id]
                  properties:
                    request_id:
                      type: string
      '401':
        description: Invalid credentials or token
        content:
          application/json:
            schema:
              type: object
              required: [error, meta]
              properties:
                error:
                  type: string
                meta:
                  type: object
                  required: [request_id]
                  properties:
                    request_id:
                      type: string

refresh:
  post:
    operationId: refreshToken
    summary: Refresh access token
    tags: [Auth]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [refresh_token]
            properties:
              refresh_token:
                type: string
    responses:
      '200':
        description: New token pair
        content:
          application/json:
            schema:
              type: object
              required: [data, meta]
              properties:
                data:
                  type: object
                  required: [access_token, refresh_token]
                  properties:
                    access_token:
                      type: string
                    refresh_token:
                      type: string
                meta:
                  type: object
                  required: [request_id]
                  properties:
                    request_id:
                      type: string
      '401':
        description: Invalid credentials or token
        content:
          application/json:
            schema:
              type: object
              required: [error, meta]
              properties:
                error:
                  type: string
                meta:
                  type: object
                  required: [request_id]
                  properties:
                    request_id:
                      type: string
