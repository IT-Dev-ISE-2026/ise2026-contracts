ping:
  get:
    operationId: testPing
    summary: Test endpoint for connectivity check
    tags: [Test]
    responses:
      '200':
        description: Pong response
        content:
          application/json:
            schema:
              type: object
              required: [data, meta]
              properties:
                data:
                  type: object
                  required: [message]
                  properties:
                    message:
                      type: string
                      example: pong
                meta:
                  type: object
                  required: [request_id]
                  properties:
                    request_id:
                      type: string
