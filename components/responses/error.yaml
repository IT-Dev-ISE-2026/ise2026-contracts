BadRequest:
  description: Invalid request
  content:
    application/json:
      schema:
        $ref: '../schemas/error-response.yaml'

Unauthorized:
  description: Invalid credentials or token
  content:
    application/json:
      schema:
        $ref: '../schemas/error-response.yaml'

Conflict:
  description: Resource already exists
  content:
    application/json:
      schema:
        $ref: '../schemas/error-response.yaml'

NotFound:
  description: Resource not found
  content:
    application/json:
      schema:
        $ref: '../schemas/error-response.yaml'

InternalServerError:
  description: Internal server error
  content:
    application/json:
      schema:
        $ref: '../schemas/error-response.yaml'
